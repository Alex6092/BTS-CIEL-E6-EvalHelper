  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --border:    #e2e6ea;
      --primary:   #4f46e5;
      --primary-light: #ede9fe;
      --success:   #16a34a;
      --success-light: #dcfce7;
      --text:      #1e293b;
      --muted:     #64748b;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    header p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
    }

    /* ── Global progress bar ── */
    #global-progress-wrap {
      max-width: 820px;
      margin: 0 auto 2rem;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.4rem;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    #global-progress-wrap span {
      white-space: nowrap;
      font-size: .9rem;
      color: var(--muted);
      min-width: 90px;
      text-align: right;
    }
    .progress-bar-bg {
      flex: 1;
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width .35s ease;
    }
    #global-percent { font-weight: 700; color: var(--primary); }

    /* ── Cards (sections) ── */
    .section-card {
      max-width: 820px;
      margin: 0 auto 1.5rem;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.2rem;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      user-select: none;
      gap: .8rem;
    }
    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
    }
    .section-badge {
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      padding: .15rem .65rem;
      font-size: .8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .section-badge.done { background: var(--success); }

    .section-toggle-icon {
      font-size: 1rem;
      transition: transform .25s;
    }
    .section-card.collapsed .section-toggle-icon { transform: rotate(-90deg); }

    .section-progress-bar {
      height: 4px;
      background: var(--primary-light);
    }
    .section-progress-fill {
      height: 100%;
      background: var(--success);
      transition: width .35s ease;
    }

    .section-body { padding: .5rem 0; }
    .section-card.collapsed .section-body { display: none; }

    /* ── Parent items ── */
    .parent-item {
      padding: .55rem 1.2rem .55rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .parent-item:last-child { border-bottom: none; }

    .parent-label-row {
      display: flex;
      align-items: flex-start;
      gap: .65rem;
      cursor: pointer;
    }

    /* ── Checkboxes ── */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 2px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      transition: background .2s, border-color .2s;
      margin-top: 2px;
    }
    input[type="checkbox"]:checked {
      background: var(--success);
      border-color: var(--success);
    }
    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 0px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    input[type="checkbox"].indeterminate {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    input[type="checkbox"].indeterminate::after {
      content: '';
      position: absolute;
      left: 2px; top: 6px;
      width: 10px; height: 2px;
      background: var(--primary);
      border: none; transform: none;
    }

    /* ── Parent text ── */
    .parent-text {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      flex: 1;
      transition: color .2s;
    }
    .parent-text.checked-text {
      color: var(--success);
      text-decoration: line-through;
      text-decoration-color: #86efac;
    }

    /* toggle children icon */
    .toggle-children {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: .75rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background .2s;
      margin-top: 1px;
    }
    .toggle-children:hover { background: var(--border); }

    /* ── Children list ── */
    .children-list {
      margin: .4rem 0 .2rem 2.2rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .child-item {
      display: flex;
      align-items: flex-start;
      gap: .55rem;
      padding: .35rem .6rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    .child-item:hover { background: var(--bg); }

    .child-text {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.45;
      flex: 1;
      transition: color .2s;
    }
    .child-text.checked-text {
      color: #a7f3d0;
      color: var(--success);
      opacity: .7;
      text-decoration: line-through;
      text-decoration-color: #86efac;
    }

    /* ── Buttons ── */
    .actions {
      max-width: 820px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: .7rem;
      justify-content: flex-end;
    }
    button.btn {
      padding: .45rem 1rem;
      border-radius: 8px;
      border: none;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button.btn:hover { opacity: .85; }
    .btn-outline {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
    }

    /* ── Status dot ── */
    .status-dot {
      width: 13px;
      height: 13px;
      min-width: 13px;
      border-radius: 50%;
      margin-top: 3px;
      flex-shrink: 0;
      transition: background-color .3s ease, box-shadow .3s ease;
      box-shadow: 0 0 0 2px rgba(0,0,0,.06);
    }
    .dot-red    { background: #ef4444; box-shadow: 0 0 0 2px #fecaca; }
    .dot-yellow { background: #eab308; box-shadow: 0 0 0 2px #fef08a; }
    .dot-blue   { background: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }
    .dot-green  { background: #22c55e; box-shadow: 0 0 0 2px #bbf7d0; }

    /* ── Legend ── */
    .legend {
      max-width: 820px;
      margin: 0 auto 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .6rem .9rem;
      font-size: .8rem;
      color: var(--muted);
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      header h1 { font-size: 1.4rem; }
      .section-header h2 { font-size: .9rem; }
    }
  </style>
</head>

  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState(); // { [id]: true/false }

function isChecked(id) { return !!state[id]; }
function setChecked(id, val) {
  state[id] = val;
  saveState(state);
}

/* ── BUILD DOM ───────────────────────────────────────────── */
const app = document.getElementById("app");

sections.forEach(section => {
  const card = document.createElement("div");
  card.className = "section-card";
  card.id = "card-" + section.id;

  /* header */
  const hdr = document.createElement("div");
  hdr.className = "section-header";
  hdr.innerHTML = `
    <h2>${section.title}</h2>
    <span class="section-badge" id="badge-${section.id}">0 / 0</span>
    <span class="section-toggle-icon">▾</span>
  `;
  hdr.addEventListener("click", () => toggleSection(section.id));
  card.appendChild(hdr);

  /* section progress bar */
  const pbar = document.createElement("div");
  pbar.className = "section-progress-bar";
  pbar.innerHTML = `<div class="section-progress-fill" id="spfill-${section.id}" style="width:0%"></div>`;
  card.appendChild(pbar);

  /* body */
  const body = document.createElement("div");
  body.className = "section-body";

  section.items.forEach(item => {
    const hasChildren = item.children && item.children.length > 0;
    const pDiv = document.createElement("div");
    pDiv.className = "parent-item";

    /* parent row */
    const row = document.createElement("div");
    row.className = "parent-label-row";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.id = "cb-" + item.id;
    cb.checked = isChecked(item.id);
    cb.addEventListener("change", () => onParentChange(item, cb.checked));

    const dot = document.createElement("span");
    dot.className = "status-dot";
    dot.id = "dot-" + item.id;

    const label = document.createElement("label");
    label.htmlFor = "cb-" + item.id;
    label.className = "parent-text" + (isChecked(item.id) ? " checked-text" : "");
    label.textContent = item.text;

    row.appendChild(cb);
    row.appendChild(dot);
    row.appendChild(label);

    if (hasChildren) {
      const btn = document.createElement("button");
      btn.className = "toggle-children";
      btn.title = "Afficher / masquer les sous-critères";
      btn.textContent = "▾";
      btn.setAttribute("aria-expanded", "true");
      btn.addEventListener("click", e => {
        e.stopPropagation();
        const cl = pDiv.querySelector(".children-list");
        const expanded = btn.getAttribute("aria-expanded") === "true";
        cl.style.display = expanded ? "none" : "flex";
        btn.setAttribute("aria-expanded", String(!expanded));
        btn.textContent = expanded ? "▸" : "▾";
      });
      row.appendChild(btn);
    }

    pDiv.appendChild(row);

    /* children */
    if (hasChildren) {
      const ul = document.createElement("div");
      ul.className = "children-list";

      item.children.forEach(child => {
        const li = document.createElement("div");
        li.className = "child-item";
        li.addEventListener("click", () => {
          const ccb = document.getElementById("cb-" + child.id);
          ccb.checked = !ccb.checked;
          onChildChange(item, child, ccb.checked);
        });

        const ccb = document.createElement("input");
        ccb.type = "checkbox";
        ccb.id = "cb-" + child.id;
        ccb.checked = isChecked(child.id);
        ccb.addEventListener("click", e => e.stopPropagation());
        ccb.addEventListener("change", () => onChildChange(item, child, ccb.checked));

        const span = document.createElement("span");
        span.className = "child-text" + (isChecked(child.id) ? " checked-text" : "");
        span.textContent = child.text;

        li.appendChild(ccb);
        li.appendChild(span);
        ul.appendChild(li);
      });

      pDiv.appendChild(ul);
    }

    body.appendChild(pDiv);
  });

  card.appendChild(body);
  app.appendChild(card);
});

/* ── STATUS DOT ──────────────────────────────────────────── */
function updateStatusDot(item) {
  const dot = document.getElementById("dot-" + item.id);
  if (!dot) return;

  let colorClass;
  if (!item.children || item.children.length === 0) {
    // Pas de sous-critères : rouge / vert selon la checkbox
    colorClass = isChecked(item.id) ? "dot-green" : "dot-red";
  } else {
    const checkedCount = item.children.filter(c => isChecked(c.id)).length;
    const total = item.children.length;
    if (checkedCount === 0)          colorClass = "dot-red";
    else if (checkedCount === 1)     colorClass = "dot-yellow";
    else if (checkedCount === total) colorClass = "dot-green";
    else                             colorClass = "dot-blue"; // 2 ou 3
  }

  dot.className = "status-dot " + colorClass;
}

/* ── EVENT HANDLERS ──────────────────────────────────────── */
function onParentChange(item, checked) {
  setChecked(item.id, checked);
  updateParentUI(item);

  // propagate to children
  if (item.children) {
    item.children.forEach(child => {
      const ccb = document.getElementById("cb-" + child.id);
      if (ccb) ccb.checked = checked;
      setChecked(child.id, checked);
      updateChildUI(child, checked);
    });
  }
  updateStatusDot(item);
  updateSectionProgress(getSectionOfItem(item.id));
  updateGlobalProgress();
}

function onChildChange(parent, child, checked) {
  setChecked(child.id, checked);
  updateChildUI(child, checked);
  syncParentToChildren(parent);
  updateSectionProgress(getSectionOfItem(parent.id));
  updateGlobalProgress();
}

function syncParentToChildren(parent) {
  if (!parent.children || parent.children.length === 0) return;
  const checkedCount = parent.children.filter(c => isChecked(c.id)).length;
  const total = parent.children.length;
  const pcb = document.getElementById("cb-" + parent.id);
  const plabel = document.querySelector(`label[for="cb-${parent.id}"]`);

  if (checkedCount === 0) {
    pcb.checked = false;
    pcb.classList.remove("indeterminate");
    setChecked(parent.id, false);
    if (plabel) plabel.classList.remove("checked-text");
  } else if (checkedCount === total) {
    pcb.checked = true;
    pcb.classList.remove("indeterminate");
    setChecked(parent.id, true);
    if (plabel) plabel.classList.add("checked-text");
  } else {
    pcb.checked = false;
    pcb.classList.add("indeterminate");
    setChecked(parent.id, false);
    if (plabel) plabel.classList.remove("checked-text");
  }
  updateStatusDot(parent);
}

function updateParentUI(item) {
  const pcb = document.getElementById("cb-" + item.id);
  const plabel = document.querySelector(`label[for="cb-${item.id}"]`);
  if (pcb && pcb.checked) {
    if (plabel) plabel.classList.add("checked-text");
  } else {
    if (plabel) plabel.classList.remove("checked-text");
  }
  if (pcb) pcb.classList.remove("indeterminate");
}

function updateChildUI(child, checked) {
  const span = document.querySelector(`#cb-${child.id} + span, #cb-${child.id} ~ span`);
  // use id-based lookup instead
  const ccb = document.getElementById("cb-" + child.id);
  if (ccb) {
    const li = ccb.closest(".child-item");
    const s = li ? li.querySelector(".child-text") : null;
    if (s) {
      if (checked) s.classList.add("checked-text");
      else s.classList.remove("checked-text");
    }
  }
}

/* ── PROGRESS ────────────────────────────────────────────── */
function countLeafItems(section) {
  let total = 0, done = 0;
  section.items.forEach(item => {
    if (!item.children || item.children.length === 0) {
      total++;
      if (isChecked(item.id)) done++;
    } else {
      item.children.forEach(child => {
        total++;
        if (isChecked(child.id)) done++;
      });
    }
  });
  return { total, done };
}

function updateSectionProgress(sectionId) {
  const section = sections.find(s => s.id === sectionId);
  if (!section) return;
  const { total, done } = countLeafItems(section);
  const pct = total ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById("spfill-" + sectionId);
  const badge = document.getElementById("badge-" + sectionId);
  if (fill) fill.style.width = pct + "%";
  if (badge) {
    badge.textContent = done + " / " + total;
    badge.classList.toggle("done", done === total && total > 0);
  }
}

function updateGlobalProgress() {
  let total = 0, done = 0;
  sections.forEach(section => {
    const c = countLeafItems(section);
    total += c.total;
    done += c.done;
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("global-fill").style.width = pct + "%";
  document.getElementById("global-percent").textContent = pct;
}

function getSectionOfItem(itemId) {
  for (const s of sections) {
    for (const item of s.items) {
      if (item.id === itemId) return s.id;
      if (item.children && item.children.find(c => c.id === itemId)) return s.id;
    }
  }
  return null;
}

/* ── SECTION COLLAPSE ────────────────────────────────────── */
function toggleSection(sectionId) {
  const card = document.getElementById("card-" + sectionId);
  card.classList.toggle("collapsed");
}
function collapseAll() {
  sections.forEach(s => document.getElementById("card-" + s.id).classList.add("collapsed"));
}
function expandAll() {
  sections.forEach(s => document.getElementById("card-" + s.id).classList.remove("collapsed"));
}

/* ── RESET ───────────────────────────────────────────────── */
function resetAll() {
  if (!confirm("Réinitialiser toute la liste ? Cette action est irréversible.")) return;
  state = {};
  saveState(state);
  // uncheck everything
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
    cb.classList.remove("indeterminate");
  });
  document.querySelectorAll(".checked-text").forEach(el => el.classList.remove("checked-text"));
  sections.forEach(s => {
    s.items.forEach(item => updateStatusDot(item));
    updateSectionProgress(s.id);
  });
  updateGlobalProgress();
}

/* ── INIT ────────────────────────────────────────────────── */
// Sync indeterminate states on load
sections.forEach(section => {
  section.items.forEach(item => {
    if (item.children && item.children.length > 0) {
      syncParentToChildren(item); // already calls updateStatusDot
      // restore child UI
      item.children.forEach(child => updateChildUI(child, isChecked(child.id)));
    } else {
      updateParentUI(item);
      updateStatusDot(item);
    }
  });
  updateSectionProgress(section.id);
});
updateGlobalProgress();
</script>
</body>
